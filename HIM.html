<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        HIM
    </title>

    <link rel="stylesheet"
    href="LostStyles.css">

</head>

<body class="him-page">

    <!-- Fondo -->
    <div class="void-bg"></div>

    <!-- Distorsión -->
    <div class="absolute-glitch"></div>

    <!-- Audio opcional -->
    <audio autoplay loop>

        <source
        src="audio/hum.mp3"
        type="audio/mp3">

    </audio>

    <!-- Contenido -->
    <main class="hidden-main">

        <section class="entity-section">

            <h1 class="entity-title">

                HIM

            </h1>

            <p class="entity-subtitle">

                HE WAS NEVER DOCUMENTED

            </p>

        </section>

        <!-- Imagen -->
        <section class="distorted-image-section">

            <img
            src="img/him.jpg"
            alt="HIM"
            class="entity-image">

        </section>

        <!-- Texto corrupto -->
        <section class="corrupted-text">

            <p>

                THEY SAID
                THE BUILDING WAS EMPTY

            </p>

            <p>

                BUT SOMETHING
                WAS WAITING
                BELOW IT

            </p>

            <p class="massive-corruption">

                D̷O̵ ̷N̴O̸T̴ ̵L̷O̴O̸K̸ ̶A̵T̷ ̷H̷I̵M̸

            </p>

        </section>

        <!-- Coordenadas -->
        <section class="coordinates">

            <p>

                03:14:09

            </p>

            <p>

                LEVEL_RED

            </p>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
